name: smpchatutils
description: $description
version: '${version}'

main: com.deglebe.smpchatutils.Smpchatutils
api-version: '1.21'
folia-supported: true

authors: [ deglebe ]
website: https://deglebe.com

# all names share one registration so /namecolor and /nc always resolve (avoids missing second command)
commands:
  smpchatutils:
    description: SMP Chat Utilities — reload and chat metadata commands
    usage: /<command> reload | namecolor … | prefix … | suffix …
    aliases: [ scu, smpchat, namecolor, nc ]
  prefix:
    description: Set a personal chat prefix
    usage: /<command> <value> | clear | preview | help
  suffix:
    description: Set a personal chat suffix
    usage: /<command> <value> | clear | preview | help
  ignore:
    description: Ignore a player's public chat
    usage: /<command> <player>
  unignore:
    description: Stop ignoring a player
    usage: /<command> <player>
  ignorelist:
    description: List players you are ignoring
    usage: /<command>

permissions:
  smpchatutils.chat.namecolor:
    description: Set a colored/styled prefix for your name in public chat
    default: true
  smpchatutils.chat.format:
    description: Use & color and style codes in public chat
    default: false
  smpchatutils.chat.ignore:
    description: Use /ignore, /unignore, and /ignorelist; receive chat filtering for ignored players
    default: true
  smpchatutils.chat.prefix:
    description: Set a personal prefix shown before your display name in chat
    default: true
  smpchatutils.chat.suffix:
    description: Set a personal suffix shown after your display name in chat
    default: true
  smpchatutils.reload:
    description: Reload configuration from disk
    default: op
  smpchatutils.admin:
    description: All administrative chat-utils permissions
    default: op
    children:
      smpchatutils.reload: true
      smpchatutils.chat.namecolor: true
      smpchatutils.chat.ignore: true
      smpchatutils.chat.prefix: true
      smpchatutils.chat.suffix: true
